[tox]
envlist=
    py38{-async,-noextras},
    py{39,310,311,312,313,314,315,py3},
    lint,
    rst,
requires =
    tox>4.22

[testenv]
dependency_groups =
    test
extras =
    aiohttp
    requests
    timezone
passenv = *
allowlist_externals = make
commands = make {env:GEOPY_TOX_TARGET:test}

[testenv:py37-async]
# Run a single job with asyncio adapter:
# (not the whole matrix, to avoid spending extra quota)
setenv = GEOPY_TEST_ADAPTER=geopy.adapters.AioHTTPAdapter

[testenv:py37-noextras]
# Ensure `pip install geopy` without any non-test extras doesn't break.
dependency_groups =
    test

[gh-actions]
python =
    3.8: py38
    3.9: py39
    3.10: py310
    3.11: py311
    3.12: py312
    3.13: py313
    3.14: py314
    3.15: py315
    pypy3: pypy3
    pypy-3.8: pypy3

[testenv:lint]
basepython = python3
dependency_groups =
    lint
usedevelop = True
commands = make lint

[testenv:rst]
basepython = python3
dependency_groups =
    docs
deps = setuptools  # needed by setup.py, until it is cleaned up
commands = make rst_check
