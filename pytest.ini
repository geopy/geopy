[pytest]
python_files =
    test/test_*.py
    test/adapters/*.py
    test/extra/*.py
    test/geocoders/*.py

; Bodies of HTTP errors are logged with INFO level
log_level = INFO

; Show warnings. Similar to `python -Wd`.
filterwarnings = d

; Show skip reasons
; Print shorter tracebacks
addopts = -ra --tb=short

asyncio_mode = auto
; Geocoder instances have class scope, so the event loop should too:
asyncio_default_test_loop_scope = class
asyncio_default_fixture_loop_scope = class
